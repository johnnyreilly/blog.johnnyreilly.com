<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#0F3C73"/>
      <stop offset="1" stop-color="#1A6B4A"/>
    </linearGradient>
    <linearGradient id="card" x1="739" y1="118" x2="1095" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#B6C9FF" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1122" cy="74" r="158" fill="#3ECC5F" fill-opacity="0.10"/>
  <circle cx="103" cy="552" r="205" fill="#38BDF8" fill-opacity="0.10"/>
  <path d="M645 128C754 103 855 91 1035 95" stroke="#9CD7FF" stroke-width="6" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M642 157C742 134 857 125 1053 135" stroke="#F9FAFB" stroke-width="2" stroke-linecap="round" stroke-opacity="0.55" stroke-dasharray="2 14"/>

  <g filter="url(#shadow)">
    <!-- Standard.site logo -->
    <rect x="375" y="62" width="102" height="102" rx="24" fill="#091224" fill-opacity="0.64" stroke="#D6E4FF" stroke-opacity="0.14"/>
    <image href="data:image/png;base64," x="388" y="75" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>

    <!-- Docusaurus logo -->
    <rect x="549" y="62" width="102" height="102" rx="24" fill="#091224" fill-opacity="0.64" stroke="#D6E4FF" stroke-opacity="0.14"/>
    <image href="data:image/svg+xml;base64," x="562" y="75" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>

    <!-- Sequoia logo -->
    <rect x="723" y="62" width="102" height="102" rx="24" fill="#091224" fill-opacity="0.64" stroke="#D6E4FF" stroke-opacity="0.14"/>
    <image href="data:image/png;base64," x="736" y="75" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>

    <!-- Title card -->
    <rect x="200" y="215" width="800" height="290" rx="32" fill="#091224" fill-opacity="0.64" stroke="#D6E4FF" stroke-opacity="0.14"/>
    <text x="600" y="295" fill="#F8FAFC" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="800" text-anchor="middle">Standard.site</text>
    <text x="600" y="365" fill="#F8FAFC" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="800" text-anchor="middle">Docusaurus with</text>
    <text x="600" y="449" fill="#3ECC5F" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="60" font-weight="800" text-anchor="middle">Sequoia</text>
  </g>
</svg>
